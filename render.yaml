services:
  - type: web
    name: porch
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORCH_SECRET
        generateValue: true
      - key: PORCH_PRODUCTION
        value: "1"
      - key: PORCH_AUTOSEED
        value: "1"
      - key: PYTHON_VERSION
        value: "3.11.7"
